{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/category.css' %}">

{% endblock %}

{% block content %}

<!-- Intro Section -->
<section>
  <div class="container-fluid intro-container d-flex align-items-center justify-content-center intro-section">
    <div class="row w-100">
      <div class="col-12 text-center intro-section-title">
        <h1 class="intro-section-title-text">DATAVERSE</h1>
        <h4 class="intro-section-title-subtitle">Connecting People through Data</h4>
        <button class="intro-section-button mt-3">Explore Insights</button>
      </div>
    </div>
  </div>
</section>

<!-- Categories Section -->
<section class="py-5 category-section">
  <div class="container">
    <div class="row g-4 justify-content-center">

      <!-- Data Lab -->
      <div class="col-12 col-md-4">
        <div class="card category-card h-100 text-center p-4 shadow-sm">
          <div class="card-body d-flex flex-column justify-content-center">
            <h5 class="category-title">Data Lab</h5>
            <a href="#" class="btn btn-primary mt-2">Explore</a>
          </div>
        </div>
      </div>

      <!-- Data University -->
      <div class="col-12 col-md-4">
        <div class="card category-card h-100 text-center p-4 shadow-sm">
          <div class="card-body d-flex flex-column justify-content-center">
            <h5 class="category-title">Data University</h5>
            <a href="#" class="btn btn-primary mt-2">Explore</a>
          </div>
        </div>
      </div>

      <!-- Data for Business -->
      <div class="col-12 col-md-4">
        <div class="card category-card h-100 text-center p-4 shadow-sm">
          <div class="card-body d-flex flex-column justify-content-center">
            <h5 class="category-title">Data for Business</h5>
            <a href="#" class="btn btn-primary mt-2">Explore</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

{% endblock content %}
