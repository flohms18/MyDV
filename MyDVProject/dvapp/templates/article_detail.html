{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/article_detail.css' %}">
{% endblock %}

{% block content %}



<section class="about-content py-5">
    <div class="container">

        <h2 class="about-title mt-5 text-center">
            {{ article.title }}
        </h2>

        <div class="article-meta text-center mt-3">
            <span class="article-category">
                {{ article.category }}
            </span>
        </div>

        <div class="about-text mt-4">
            {{ article.content|safe }}
        </div>

        <div class="text-center mt-5">
            <a href="{% url 'index' %}" class="btn btn-about">Back</a>
        </div>

    </div>
</section>

{% endblock content %}
